<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abd Erraouf</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --coral: #FF6B6B;
    --teal: #00C9A7;
    --purple: #845EC2;
    --bg1: #0F2027;
    --bg2: #203A43;
    --bg3: #2C5364;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--bg1), var(--bg2), var(--bg3));
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Animated blobs */
  .blob {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.18;
    animation: drift 10s ease-in-out infinite alternate;
    pointer-events: none;
  }
  .blob1 { width: 400px; height: 400px; background: var(--teal); top: -100px; left: -100px; animation-delay: 0s; }
  .blob2 { width: 350px; height: 350px; background: var(--coral); bottom: -80px; right: -80px; animation-delay: 3s; }
  .blob3 { width: 280px; height: 280px; background: var(--gold); top: 50%; left: 60%; animation-delay: 6s; }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(40px, 30px) scale(1.1); }
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 10;
    width: min(420px, 92vw);
    padding: 48px 32px 44px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 32px;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    text-align: center;
    animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Avatar */
  .avatar-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 20px;
  }
  .avatar-ring {
    width: 96px; height: 96px;
    border-radius: 50%;
    background: conic-gradient(var(--gold), var(--coral), var(--teal), var(--gold));
    padding: 3px;
    animation: spin 6s linear infinite;
    display: flex; align-items: center; justify-content: center;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  .avatar-inner {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a2a3a, #2c4a5a);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 2px;
  }

  /* Sparkles */
  .sparkle {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    animation: sparkle 2s ease-in-out infinite;
  }
  .sparkle:nth-child(1) { background: var(--teal);  top: 0; right: 8px;  animation-delay: 0s; }
  .sparkle:nth-child(2) { background: var(--coral); bottom: 4px; left: 4px; animation-delay: 0.7s; }
  .sparkle:nth-child(3) { background: var(--gold);  top: 10px; left: -4px; animation-delay: 1.4s; }
  @keyframes sparkle {
    0%,100% { opacity: 0; transform: scale(0); }
    50%      { opacity: 1; transform: scale(1.4); }
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    animation: rise 0.8s 0.15s cubic-bezier(0.22,1,0.36,1) both;
  }
  .tagline {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 36px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    animation: rise 0.8s 0.22s cubic-bezier(0.22,1,0.36,1) both;
  }

  /* Links */
  .links { display: flex; flex-direction: column; gap: 14px; }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 20px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    color: #fff;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.22,1,0.36,1),
                box-shadow 0.25s ease,
                border-color 0.25s ease;
    animation: rise 0.8s cubic-bezier(0.22,1,0.36,1) both;
  }
  .link-btn:nth-child(1) { animation-delay: 0.3s; }
  .link-btn:nth-child(2) { animation-delay: 0.42s; }
  .link-btn:nth-child(3) { animation-delay: 0.54s; }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .link-btn.ig1::before  { background: linear-gradient(135deg, rgba(225,48,108,0.18), rgba(88,81,219,0.18)); }
  .link-btn.ig2::before  { background: linear-gradient(135deg, rgba(88,81,219,0.18), rgba(225,48,108,0.18)); }
  .link-btn.tt::before   { background: linear-gradient(135deg, rgba(0,201,167,0.18), rgba(201,168,76,0.18)); }

  .link-btn:hover { transform: translateY(-3px) scale(1.01); }
  .link-btn.ig1:hover { box-shadow: 0 12px 40px rgba(225,48,108,0.3); border-color: rgba(225,48,108,0.4); }
  .link-btn.ig2:hover { box-shadow: 0 12px 40px rgba(88,81,219,0.3); border-color: rgba(88,81,219,0.4); }
  .link-btn.tt:hover  { box-shadow: 0 12px 40px rgba(0,201,167,0.3); border-color: rgba(0,201,167,0.4); }
  .link-btn:hover::before { opacity: 1; }

  .icon-wrap {
    width: 48px; height: 48px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 22px;
  }
  .ig1 .icon-wrap { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .ig2 .icon-wrap { background: linear-gradient(225deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .tt  .icon-wrap { background: #000; border: 1px solid rgba(255,255,255,0.2); }

  .link-text { text-align: left; flex: 1; position: relative; z-index: 1; }
  .link-name { font-size: 15px; font-weight: 500; color: #fff; }
  .link-handle { font-size: 12px; color: rgba(255,255,255,0.45); margin-top: 2px; }

  .arrow {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    transition: background 0.2s, color 0.2s, transform 0.25s;
    flex-shrink: 0;
    position: relative; z-index: 1;
  }
  .link-btn:hover .arrow {
    background: rgba(255,255,255,0.18);
    color: #fff;
    transform: translateX(3px);
  }

  /* TikTok SVG icon */
  .tiktok-icon { width: 22px; height: 22px; }
</style>
</head>
